<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>casinelli</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" type="text/css" href="./css/panchang.css" />
<link rel="stylesheet" type="text/css" href="./css/array.css" />
<link rel="stylesheet" type="text/css" href="./css/boska.css" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Courier+Prime:ital@0;1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after {
    margin: 0; padding: 0; box-sizing: border-box;
  }

  :root {
    --void: #080808;
    --signal: #FF0080;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--void);
    cursor: crosshair;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    background-size: 256px 256px;
    opacity: 0.45;
    pointer-events: none;
    z-index: 100;
  }

  .stage {
    position: relative;
    width: 100vw; height: 100vh;
  }

  /* ── SIGNAL BLOCK — 4% gap all sides ── */
  .signal-block {
    position: absolute;
    top: 4vh; left: 4vw;
    width: 92vw; height: 92vh;
    background: var(--signal);
    z-index: 2;
    animation: breathe 9s ease-in-out infinite;
  }

  .signal-block::before {
    content: '';
    position: absolute;
    inset: -20px;
    background: var(--signal);
    filter: blur(40px);
    opacity: 0.5;
    z-index: -1;
    animation: coronapulse 9s ease-in-out infinite;
  }

  .signal-block::after {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 35% 35%, rgba(255,255,255,0.09) 0%, transparent 62%);
  }

  @keyframes breathe {
    0%,100% { filter: brightness(1); }
    50% { filter: brightness(1.07); }
  }
  @keyframes coronapulse {
    0%,100% { opacity:0.5; filter:blur(40px); }
    50% { opacity:0.65; filter:blur(56px); }
  }

  /* Grouping for name + words to manage z-index together */
  .text-group {
    position: absolute;
    bottom: calc(4vh + 2.8vh);
    left: calc(4vw + 2.6vw);
    z-index: 10;
  }
  /* ── NAME — bottom-left of block, white ── */
  .name {
    margin-top: 20px;
    font-family: Panchang-Extrabold;
    font-size: 18vh;
    letter-spacing: 0.05em;
    color: #ffffff;
    text-transform: lowercase;
    line-height: 1;
    animation: namein 2s cubic-bezier(0.16,1,0.3,1) both;
    animation-delay: 0.8s;
  }

  @keyframes namein {
    from { opacity:0; transform:translateY(14px); }
    to { opacity:1; transform:translateY(0); }
  }

  /* ── THREE WORDS — right-justified on block, ~70% name size, barely visible ── */
  .words {
    gap: 0.12em;
    animation: wordsin 3s ease both;
    animation-delay: 1.3s;
  }

  .words span {
    display: block;
    font-family: 'Boska-Black';
    font-weight: 700;
    font-size: 150px;
    letter-spacing: 0.15em;
    text-transform: lowercase;
    line-height: 1;
    white-space: nowrap;
  }

  .words span:nth-child(1) { color: rgba(0,0,0,0.22); }
  .words span:nth-child(2) { color: rgba(0,0,0,0.15); }
  .words span:nth-child(3) { color: rgba(0,0,0,0.09); }

  @keyframes wordsin {
    from { opacity:0; } to { opacity:1; }
  }

  /* ══════════════════════════════════════════════════
     SILHOUETTE SLOT
     Position: lower-right quadrant of signal block
     Anchored to bottom edge of block
     Width: 22vw · Height: up to 80vh
     Replace .silo-placeholder with chosen SVG.
     The SVG should be dark (#080808 or near-black)
     and fade to transparent at the feet.
  ══════════════════════════════════════════════════ */
  .silhouette-slot {
    position: absolute;
    bottom: 4vh;
    right: calc(4vw + 5vw);
    width: 22vw;
    height: 80vh;
    z-index: 8;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    pointer-events: none;
  }

  .silo-placeholder {
    width: 100%;
    height: 100%;
    border: 1px dashed rgba(0,0,0,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .silo-placeholder span {
    font-family: 'Courier Prime', monospace;
    font-size: 0.5rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(0,0,0,0.28);
    writing-mode: vertical-rl;
  }

  /* ── EMAIL — bottom-right of void, outside block ── */
  .contact {
    position: absolute;
    bottom: calc(4vh + 1.6vh);
    right: 1.6vw;
    z-index: 20;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 0.5em;
    animation: contactin 3.4s cubic-bezier(0.16,1,0.3,1) both;
    animation-delay: 1.8s;
  }

  .contact-label {
    font-family: 'Courier Prime', monospace;
    font-size: 0.5rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.18);
    font-style: italic;
  }

  .contact-row {
    display: flex;
    border: 1px solid rgba(255,0,128,0.28);
    background: rgba(8,8,8,0.65);
    backdrop-filter: blur(6px);
  }

  .contact-row input {
    background: transparent;
    border: none; outline: none;
    padding: 0.5em 0.9em;
    font-family: 'Courier Prime', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    color: rgba(255,255,255,0.65);
    width: 15em;
    caret-color: var(--signal);
  }

  .contact-row input::placeholder {
    color: rgba(255,255,255,0.18);
    font-style: italic;
  }

  .contact-row button {
    background: var(--signal);
    border: none;
    padding: 0.5em 1em;
    font-family: 'Courier Prime', monospace;
    font-size: 0.58rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #080808;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }
  .contact-row button:hover {
    background: #080808;
    color: var(--signal);
  }

  @keyframes contactin {
    from { opacity:0; transform:translateY(8px); }
    to { opacity:1; transform:translateY(0); }
  }

  /* ── COORDINATE STAMPS ── */
  .coord {
    position: absolute;
    font-family: 'Courier Prime', monospace;
    font-size: 0.42rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    pointer-events: none;
    z-index: 60;
    animation: slowfade 4.5s ease both;
    animation-delay: 2.4s;
  }
  .coord-tl { top: 1.4vh; left: 1.6vw; color: rgba(255,255,255,0.1); }
  .coord-br { bottom: 1.2vh; right: 1.6vw; color: rgba(255,255,255,0.07); }

  @keyframes slowfade {
    from { opacity:0; } to { opacity:1; }
  }

  /* ── SCANLINE ── */
  .scanline {
    position: fixed;
    left: 0; width: 100%; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,0,128,0.04), transparent);
    animation: scan 16s linear infinite;
    pointer-events: none;
    z-index: 99;
  }
  @keyframes scan {
    from { top:-2px; } to { top:100vh; }
  }

  /* ── CURSOR GLOW ── */
  .cursor-glow {
    position: fixed;
    width: 360px; height: 360px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,0,128,0.03) 0%, transparent 70%);
    pointer-events: none;
    transform: translate(-50%,-50%);
    z-index: 50;
  }

  /* ── PAGE VEIL ── */
  .veil {
    position: fixed; inset: 0;
    background: var(--void);
    z-index: 200;
    animation: unveil 1.6s cubic-bezier(0.76,0,0.24,1) forwards;
    animation-delay: 0.1s;
    transform-origin: top;
  }
  @keyframes unveil {
    from { transform:scaleY(1); }
    to { transform:scaleY(0); }
  }
</style>
</head>
<body>

<div class="veil"></div>
<div class="cursor-glow" id="glow"></div>
<div class="scanline"></div>

<div class="stage">

  <div class="coord coord-tl">incarnation sequence · active</div>
  <div class="coord coord-br">signal detected · archive open · hecarrieswater.com</div>

  <!-- signal block -->
  <div class="signal-block"></div>

  <div class="text-group">
    <!-- three words: right-justified, on block, barely visible -->
    <div class="words">
      <span>catharsis</span>
      <span>chrysalis</span>
      <span>creation</span>
    </div>
    <!-- name: bottom-left, white, on block -->
    <div class="name">casinelli</div>
  </div>
  <!-- email capture: outside block, bottom-right void -->
  <div class="contact">
    <div class="contact-label">transmission received</div>
    <div class="contact-row">
      <input type="email" placeholder="your coordinates" id="emailInput"/>
      <button onclick="handleSubmit()">enter</button>
    </div>
  </div>

</div>

<script>
  const glow = document.getElementById('glow');
  document.addEventListener('mousemove', e => {
    glow.style.left = e.clientX + 'px';
    glow.style.top = e.clientY + 'px';
  });

  function handleSubmit() {
    const input = document.getElementById('emailInput');
    const val = input.value.trim();
    if (!val || !val.includes('@')) return;
    const row = input.closest('.contact-row');
    row.innerHTML = '<span style="padding:0.5em 1em;font-family:\'Courier Prime\',monospace;font-size:0.68rem;letter-spacing:0.18em;color:rgba(255,0,128,0.75);font-style:italic;">signal logged.</span>';
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') handleSubmit();
  });
</script>

</body>
</html>
